<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Rakan Eyad</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E1310">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='9' fill='%230E6B49'/%3E%3Ctext x='32' y='43' font-family='Arial,sans-serif' font-size='27' font-weight='800' fill='%23F3F6F2' text-anchor='middle'%3ERE%3C/text%3E%3C/svg%3E">
<script>
/* theme init — same logic as index.html so the 404 matches the visitor's theme */
(function(){
  var theme = "dark";
  try{
    var stored = localStorage.getItem("theme");
    if(stored === "light" || stored === "dark") theme = stored;
    else if(window.matchMedia("(prefers-color-scheme: light)").matches) theme = "light";
  }catch(e){/* storage blocked — keep dark default */}
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#0E1310;
  --ink:#EDF1EE;
  --dim:#9AA79E;
  --rule:#46594D;
  --mask:#22AE79;
  --copper:#E8A34D;
}
html[data-theme="light"]{
  --paper:#F4F6F2;
  --ink:#141B16;
  --dim:#5D6C62;
  --rule:#C7D2C9;
  --mask:#0E6B49;
  --copper:#8F5410;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--paper);color:var(--ink);
  font-family:"IBM Plex Mono",ui-monospace,monospace;
  padding:24px;
}
.doc{max-width:560px;width:100%;border:1px solid var(--rule);border-radius:5px;padding:36px 32px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
h1{font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(44px,10vw,72px);line-height:.95;letter-spacing:-.02em;margin-bottom:14px}
p{font-size:13.5px;line-height:1.65;color:var(--dim);margin-bottom:26px}
a.home{
  display:inline-block;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mask);text-decoration:none;border:1px solid var(--rule);border-radius:99px;
  padding:11px 20px;transition:border-color .2s ease;
}
a.home:hover,a.home:focus-visible{border-color:var(--mask)}
</style>
</head>
<body>
<main class="doc">
  <p class="eyebrow">Doc. RE-2026 · Error 404</p>
  <h1>Page not found.</h1>
  <p>This document doesn't exist or has been moved. Everything lives on the one datasheet.</p>
  <a class="home" href="/">Back to the datasheet →</a>
</main>
</body>
</html>
